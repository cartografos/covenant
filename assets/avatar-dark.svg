<svg width="280" height="280" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
  <!-- github dark background -->
  <rect width="280" height="280" fill="#0D1117"/>

  <!-- avatar circle border -->
  <circle cx="140" cy="140" r="130" fill="#0D1117" stroke="#30363D" stroke-width="1"/>

  <!-- sendero mark — 160×160, centered (x=60 y=60), viewBox 96×96 -->
  <svg x="60" y="60" width="160" height="160" viewBox="0 0 96 96">
    <!-- contour lines (faint topo) -->
    <g fill="none" stroke="#F3EFF5" stroke-width="0.6" opacity="0.16">
      <path d="M 14 70 Q 30 48, 48 50 T 82 30"/>
      <path d="M 12 78 Q 32 56, 50 58 T 84 38"/>
      <path d="M 10 86 Q 34 64, 52 66 T 86 46"/>
      <path d="M 16 62 Q 28 40, 46 42 T 80 22"/>
    </g>
    <!-- trail — PRD → Spec → Plan → Implement -->
    <polyline
      points="20,72 38,56 56,62 76,28"
      fill="none"
      stroke="#F3EFF5"
      stroke-width="1.6"
      stroke-linecap="round"
      stroke-linejoin="round"/>
    <!-- station nodes -->
    <circle cx="20" cy="72" r="3.2" fill="#0D1117" stroke="#F3EFF5" stroke-width="1.4"/>
    <circle cx="38" cy="56" r="3.2" fill="#0D1117" stroke="#F3EFF5" stroke-width="1.4"/>
    <circle cx="56" cy="62" r="3.2" fill="#0D1117" stroke="#F3EFF5" stroke-width="1.4"/>
    <!-- destination node — red accent -->
    <circle cx="76" cy="28" r="4" fill="#E03030"/>
    <circle cx="76" cy="28" r="7" fill="none" stroke="#E03030" stroke-width="0.8" opacity="0.5"/>
  </svg>
</svg>
