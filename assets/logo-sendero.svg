<svg width="640" height="120" viewBox="0 0 640 120" xmlns="http://www.w3.org/2000/svg">
  <!-- ink background -->
  <rect width="640" height="120" rx="6" fill="#0D0A0B"/>

  <!-- sendero mark — 72×72, viewBox 96×96, centered at y=24 -->
  <svg x="36" y="24" width="72" height="72" viewBox="0 0 96 96">
    <!-- contour lines (faint topo) -->
    <g fill="none" stroke="#F3EFF5" stroke-width="0.6" opacity="0.16">
      <path d="M 14 70 Q 30 48, 48 50 T 82 30"/>
      <path d="M 12 78 Q 32 56, 50 58 T 84 38"/>
      <path d="M 10 86 Q 34 64, 52 66 T 86 46"/>
      <path d="M 16 62 Q 28 40, 46 42 T 80 22"/>
    </g>
    <!-- the trail — PRD → Spec → Plan → Implement -->
    <polyline
      points="20,72 38,56 56,62 76,28"
      fill="none"
      stroke="#F3EFF5"
      stroke-width="1.6"
      stroke-linecap="round"
      stroke-linejoin="round"/>
    <!-- station nodes (open rings) -->
    <circle cx="20" cy="72" r="3.2" fill="#0D0A0B" stroke="#F3EFF5" stroke-width="1.4"/>
    <circle cx="38" cy="56" r="3.2" fill="#0D0A0B" stroke="#F3EFF5" stroke-width="1.4"/>
    <circle cx="56" cy="62" r="3.2" fill="#0D0A0B" stroke="#F3EFF5" stroke-width="1.4"/>
    <!-- destination node — spring green accent -->
    <circle cx="76" cy="28" r="4" fill="#E03030"/>
    <circle cx="76" cy="28" r="7" fill="none" stroke="#E03030" stroke-width="0.8" opacity="0.5"/>
  </svg>

  <!-- separator -->
  <line x1="128" y1="30" x2="128" y2="90" stroke="#F3EFF5" stroke-opacity="0.18" stroke-width="1"/>

  <!-- wordmark -->
  <text
    x="148" y="68"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="300"
    font-size="30"
    fill="#F3EFF5"
    letter-spacing="-0.5">cartógrafos<tspan fill="#E03030" dx="8" dy="-1" font-size="7">●</tspan></text>

  <!-- tagline -->
  <text
    x="148" y="90"
    font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace"
    font-size="11"
    fill="#454955"
    letter-spacing="0.3">// mapping the path from problem to code</text>
</svg>
